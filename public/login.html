<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OZU CRASHER V2 — Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap');
    :root{--p:#00f0ff;--s:#7b2fff;--a:#ff2d75;--d:#0a0a0f;--c:rgba(15,15,25,.92);--ok:#00ff6a;--er:#ff2d55}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:var(--d);color:#e0e0e0;min-height:100vh;overflow-x:hidden;display:flex;align-items:center;justify-content:center}
    .bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,240,255,.03)1px,transparent 1px),linear-gradient(90deg,rgba(0,240,255,.03)1px,transparent 1px);background-size:60px 60px;animation:g 20s linear infinite}
    @keyframes g{100%{transform:translate(60px,60px)}}
    .orbs{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden}
    .ob{position:absolute;border-radius:50%;filter:blur(100px);opacity:.3;animation:of 18s ease-in-out infinite}
    .ob:nth-child(1){width:420px;height:420px;background:var(--s);top:-120px;left:-120px}
    .ob:nth-child(2){width:350px;height:350px;background:var(--p);bottom:-100px;right:-100px;animation-delay:-6s}
    .ob:nth-child(3){width:200px;height:200px;background:var(--a);top:40%;left:60%;animation-delay:-12s;opacity:.2}
    @keyframes of{0%,100%{transform:translate(0,0)scale(1)}33%{transform:translate(25px,-35px)scale(1.08)}66%{transform:translate(-15px,25px)scale(.92)}}
    .pts{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
    .pt{position:absolute;width:2px;height:2px;background:var(--p);border-radius:50%;opacity:0;animation:r 7s ease-in-out infinite}
    @keyframes r{0%{opacity:0;transform:translateY(100vh)scale(0)}40%{opacity:.6}100%{opacity:0;transform:translateY(-10vh)scale(1.5)}}
    .w{position:relative;z-index:1;width:100%;max-width:440px;padding:20px}
    .card{background:var(--c);border:1px solid rgba(255,255,255,.06);border-radius:24px;padding:44px 36px 36px;box-shadow:0 40px 80px rgba(0,0,0,.55);position:relative;overflow:hidden;backdrop-filter:blur(12px)}
    .card::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,var(--p),var(--s),var(--a))}
    .lg{text-align:center;margin-bottom:6px}.lg a{font-family:'Orbitron';font-size:26px;font-weight:900;background:linear-gradient(135deg,var(--p),var(--s));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;letter-spacing:2px}.lg a em{-webkit-text-fill-color:var(--a);font-style:normal;font-size:15px;margin-left:3px}
    .hd{text-align:center;margin-bottom:32px}
    .ic{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,rgba(0,240,255,.08),rgba(123,47,255,.08));border:2px solid rgba(0,240,255,.12);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:28px;animation:ig 3s ease-in-out infinite}
    @keyframes ig{0%,100%{box-shadow:0 0 0 0 rgba(0,240,255,.18)}50%{box-shadow:0 0 0 14px rgba(0,240,255,0)}}
    .hd h1{font-family:'Orbitron';font-size:20px;font-weight:800;color:#fff}.hd p{font-size:13px;color:#666;margin-top:5px}
    .fg{margin-bottom:18px}.fg label{display:block;font-size:11px;font-weight:700;color:#777;margin-bottom:7px;text-transform:uppercase;letter-spacing:1.2px}
    .ib{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:0 14px;transition:.3s}
    .ib:focus-within{border-color:var(--p);box-shadow:0 0 0 3px rgba(0,240,255,.08)}
    .ib .io{font-size:17px;color:#444;flex-shrink:0}
    .ib input{flex:1;background:none;border:none;outline:none;padding:13px 0;font-size:14px;color:#fff;font-family:'Inter'}
    .ib input::placeholder{color:#3a3a4a}
    .pwt{background:none;border:none;color:#555;font-size:17px;cursor:pointer;padding:4px;transition:.2s}.pwt:hover{color:var(--p)}
    .toast{display:none;align-items:center;gap:8px;padding:11px 14px;border-radius:10px;margin-bottom:16px;font-size:12px;font-weight:500;animation:si .35s ease}
    @keyframes si{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    .te{background:rgba(255,45,85,.08);border:1px solid rgba(255,45,85,.18);color:var(--er)}
    .ts{background:rgba(0,255,106,.06);border:1px solid rgba(0,255,106,.15);color:var(--ok)}
    .ab{width:100%;padding:14px;border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;background:linear-gradient(135deg,var(--p),var(--s));color:#000;transition:.3s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px}
    .ab:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 0 32px rgba(0,240,255,.3)}
    .ab:disabled{opacity:.45;cursor:not-allowed}
    .ab .sp{width:16px;height:16px;border:2px solid transparent;border-top-color:#000;border-right-color:#000;border-radius:50%;animation:spi .65s linear infinite;display:none}
    @keyframes spi{100%{transform:rotate(360deg)}}
    .dv{display:flex;align-items:center;gap:14px;margin:24px 0}.dv::before,.dv::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}.dv span{font-size:11px;color:#444;text-transform:uppercase;letter-spacing:1px}
    .af{text-align:center;font-size:13px;color:#555}.af a{color:var(--p);text-decoration:none;font-weight:600;transition:.2s}.af a:hover{color:#fff}
    .bh{display:block;text-align:center;margin-top:18px;font-size:12px;color:#444;text-decoration:none;transition:.2s}.bh:hover{color:var(--p)}
    @media(max-width:480px){.card{padding:32px 22px 28px;border-radius:18px}}
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="orbs"><div class="ob"></div><div class="ob"></div><div class="ob"></div></div>
  <div class="pts" id="pts"></div>
  <div class="w">
    <div class="card">
      <div class="lg"><a href="/">OZU<em>V2</em></a></div>
      <div class="hd"><div class="ic">🔐</div><h1>Welcome Back</h1><p>Login to your OZU Crasher account</p></div>
      <div class="toast te" id="te"><span id="tei">❌</span> <span id="tem"></span></div>
      <div class="toast ts" id="ts"><span>✅</span> <span id="tsm"></span></div>
      <form id="frm" onsubmit="go(event)">
        <div class="fg"><label>Username or Email</label><div class="ib"><span class="io">👤</span><input type="text" id="usr" placeholder="Enter username or email" autocomplete="username" required></div></div>
        <div class="fg"><label>Password</label><div class="ib"><span class="io">🔒</span><input type="password" id="pw" placeholder="Enter your password" autocomplete="current-password" required><button type="button" class="pwt" onclick="this.previousElementSibling.type=this.previousElementSibling.type==='password'?'text':'password'">👁️</button></div></div>
        <button type="submit" class="ab" id="btn"><span class="sp" id="sp"></span><span id="bt">⚡ Login</span></button>
      </form>
      <div class="dv"><span>or</span></div>
      <div class="af">Don't have an account? <a href="/signup">Create Account</a></div>
      <a href="/" class="bh">← Back to Home</a>
    </div>
  </div>
  <script>
    (function(){const c=document.getElementById('pts');for(let i=0;i<25;i++){const p=document.createElement('div');p.classList.add('pt');p.style.left=Math.random()*100+'%';p.style.animationDelay=Math.random()*7+'s';p.style.animationDuration=(5+Math.random()*5)+'s';c.appendChild(p)}})();
    if(localStorage.getItem('ozu_token'))window.location.href='/dashboard';
    function err(m){document.getElementById('tem').textContent=m;document.getElementById('te').style.display='flex';document.getElementById('ts').style.display='none'}
    function ok(m){document.getElementById('tsm').textContent=m;document.getElementById('ts').style.display='flex';document.getElementById('te').style.display='none'}
    async function go(e){
      e.preventDefault();
      const u=document.getElementById('usr').value.trim(),p=document.getElementById('pw').value;
      if(!u||!p){err('Please fill in all fields');return}
      const btn=document.getElementById('btn'),bt=document.getElementById('bt'),sp=document.getElementById('sp');
      btn.disabled=true;bt.textContent='Logging in...';sp.style.display='block';
      try{
        const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
        const d=await r.json();
        if(d.success){localStorage.setItem('ozu_token',d.token);localStorage.setItem('ozu_user',JSON.stringify(d.user));ok('Login successful! Redirecting...');setTimeout(()=>window.location.href='/dashboard',1000)}
        else{err(d.message||'Login failed');btn.disabled=false;bt.textContent='⚡ Login';sp.style.display='none'}
      }catch(x){err('Network error. Try again.');btn.disabled=false;bt.textContent='⚡ Login';sp.style.display='none'}
    }
  </script>
</body>
</html>
